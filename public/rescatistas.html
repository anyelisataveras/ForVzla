  </div>

<script>
const SB_URL='https://ebsgvamzaegjgpjkpick.supabase.co';
const SB_KEY='sb_publishable_vg8SSOkKpgvwOSyi2k-aVg_lslrQsBA';
const db=supabase.createClient(SB_URL,SB_KEY);

// ── Analytics (PostHog) — mismo contrato/sanitizado que la app principal ──
const A=window.ForVzlaAnalytics, E=(A&&A.EVENTS)||{};
function track(ev,p){try{if(A&&ev)A.track(ev,p);}catch(_){}}
// Resumen no-sensible de una necesidad para eventos de embudo.
function needMeta(n){return n?{need_id:n.id,urgencia:n.urgencia,rescate_estado:n.rescate_estado||'nuevo',plataforma:n.fuente,signos_vida:hasLife(n),atrapados:hasTrap(n),tiene_coords:!!(n.lat&&n.lng),tiene_tel:!!(n.telefono||n.whatsapp)}:{};}

let ALL=[], fEstado='activos', fHoras=24, view='lista', map=null, markers=null;

const ESTADOS=[
  {k:'activos',l:'Activos'},
  {k:'todos',l:'Todos'},
  {k:'nuevo',l:'🆕 Nuevos'},
  {k:'verificando',l:'🔍 Verificando'},
  {k:'confirmada',l:'✅ Confirmadas'},
  {k:'atendida',l:'✔️ Atendidas'},
  {k:'falsa',l:'❌ Falsas'},
];
const HORAS=[{k:6,l:'6h'},{k:24,l:'24h'},{k:72,l:'72h'},{k:0,l:'Todo'}];
const ST_LABEL={nuevo:'🆕 Nuevo',verificando:'🔍 Verificando',confirmada:'✅ Confirmada',atendida:'✔️ Atendida',falsa:'❌ Falsa'};
const SRC={ciudadano:'Ciudadano',instagram:'Instagram',tiktok:'TikTok',twitter:'X / Twitter',telegram:'Telegram',coordinador:'Coordinador'};
const LIFE_RE=/signos de vida|se escuchan|se oyen|golpean|golpes|dando golpes|piden auxilio|responde|responden|siguen con vida|sigue con vida|est[aá] (vivo|viva)|est[aá]n viv[oa]s?|hay vida|escuchamos|sobreviviente|dio se[nñ]ales|(lo|la) encontramos (vivo|viva)|\bcon vida\b/i;
const TRAP_RE=/atrapad|sigue atrapad|soterrad|debajo del|bajo (los |el )?escombros|entre los escombros|escombros|no pueden salir|siguen adentro|siguen dentro|no (lo|la) han sacado|derrumb|desaparecid|sin noticias de|no aparece|se busca a|b[uú]squeda de|rescate|maquinaria pesada/i;

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ago(ts){if(!ts)return'';const d=Math.floor((Date.now()-new Date(ts))/60000);if(d<1)return'ahora';if(d<60)return'hace '+d+'m';if(d<1440)return'hace '+Math.floor(d/60)+'h';return'hace '+Math.floor(d/1440)+'d';}
function cleanText(s){if(!s)return'';return s.replace(/__tv_id:[0-9a-f-]{36}__/gi,'').replace(/https?:\/\/\S+/gi,'').replace(/\s*·\s*·+/g,' · ').replace(/^[·\s]+|[·\s]+$/g,'').trim();}
function tel(n){return(n||'').replace(/[\s()-]/g,'');}
// Un valor sirve como teléfono solo si no trae letras (URLs, @user, etc.) y tiene dígitos suficientes.
function isPhoneish(v){return!!v&&!/[a-z]/i.test(v)&&(v.replace(/\D/g,'').length>=7);}
// Normaliza a formato wa.me: solo dígitos con código de país (VE por defecto). '' si no es teléfono válido.
function waNum(v){if(!isPhoneish(v))return'';let d=v.replace(/\D/g,'');if(d.startsWith('00'))d=d.slice(2);if(d.startsWith('0'))d='58'+d.slice(1);return(d.length>=10&&d.length<=15)?d:'';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}

function needTipos(n){return(n.tipos&&n.tipos.length)?n.tipos:[n.tipo].filter(Boolean);}
function isRescate(n){return needTipos(n).some(t=>/rescate/i.test(t))||!!n.edificio_id||TRAP_RE.test((n.descripcion||''));}
function hasLife(n){return LIFE_RE.test((n.descripcion||''));}
function hasTrap(n){return !!n.edificio_id||TRAP_RE.test((n.descripcion||''));}
function locStr(n){const d=(n.direccion_exacta||'').trim();const z=(n.zona||'').trim();
  if(d&&d!=='Ubicación GPS'&&d.toLowerCase()!==z.toLowerCase())return[d,z].filter(Boolean).join(' · ');
  return z||d||'Ubicación sin especificar';}

async function cargar(){
  const{data,error}=await db.from('necesidades')
    .select('*')
    .is('merged_into',null)
    .or('tipo.eq.Rescate,tipos.cs.{Rescate},edificio_id.not.is.null')
    .order('created_at',{ascending:false})
    .limit(600);
  if(error){document.getElementById('list').innerHTML='<div class="empty"><div class="ico">⚠️</div>No se pudo cargar. Revisa la conexión e intenta de nuevo.</div>';console.error(error);track(E.RESCATE_LOAD_FAILED,{code:error.code||null});return;}
  ALL=(data||[]).filter(isRescate);
  const now=new Date();
  document.getElementById('updated-line').textContent='Actualizado '+now.toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'});
  track(E.RESCATE_LIST_LOADED,{
    total:ALL.length,
    con_signos_vida:ALL.filter(hasLife).length,
    con_atrapados:ALL.filter(hasTrap).length,
    con_coords:ALL.filter(n=>n.lat&&n.lng).length,
    sin_telefono:ALL.filter(n=>!n.telefono&&!n.whatsapp).length,
    nuevos:ALL.filter(n=>(n.rescate_estado||'nuevo')==='nuevo').length,
    ultimas_24h:ALL.filter(n=>{const t=n.created_at?new Date(n.created_at).getTime():0;return t>=Date.now()-86400000;}).length
  });
  render();
}

function chipCount(k){
  const base=ALL.filter(withinHoras);
  if(k==='todos')return base.length;
  if(k==='activos')return base.filter(n=>n.rescate_estado!=='atendida'&&n.rescate_estado!=='falsa').length;
  return base.filter(n=>(n.rescate_estado||'nuevo')===k).length;
}
function withinHoras(n){if(!fHoras)return true;const t=n.created_at?new Date(n.created_at).getTime():0;return t>=Date.now()-fHoras*3600*1000;}

function renderChips(){
  document.getElementById('chips-estado').innerHTML=ESTADOS.map(e=>
    `<button class="chip${fEstado===e.k?' on':''}" onclick="setEstado('${e.k}')">${e.l}<span class="n">${chipCount(e.k)}</span></button>`).join('');
  document.getElementById('chips-horas').innerHTML='<span class="chip" style="pointer-events:none;background:transparent;border:none;color:var(--txt3);padding-left:0">Ventana:</span>'+
    HORAS.map(h=>`<button class="chip${fHoras===h.k?' on':''}" onclick="setHoras(${h.k})">${h.l}</button>`).join('');
}
function setEstado(k){if(k!==fEstado)track(E.RESCATE_FILTER_CHANGED,{filtro:'estado',valor:k});fEstado=k;render();}
function setHoras(k){if(k!==fHoras)track(E.RESCATE_FILTER_CHANGED,{filtro:'ventana',valor:k});fHoras=k;render();}
function setView(v){if(v!==view)track(E.RESCATE_VIEW_CHANGED,{vista:v});view=v;
  document.getElementById('tab-lista').classList.toggle('on',v==='lista');
  document.getElementById('tab-mapa').classList.toggle('on',v==='mapa');
  document.getElementById('map-stage').style.display=v==='mapa'?'block':'none';
  document.getElementById('list').style.display=v==='mapa'?'none':'grid';
  if(v==='mapa')renderMapa();
}

// Búsqueda: debounce para no spamear. No enviamos el término (puede ser ubicación),
// sí su longitud y si arrojó resultados → señal clave de "qué falta en la data".
let _searchT=null;
function onSearch(){clearTimeout(_searchT);_searchT=setTimeout(()=>{
  const q=(document.getElementById('q').value||'').trim();
  if(!q)return;
  track(E.RESCATE_SEARCH,{longitud:q.length,resultados:filtered().length});
},900);}

function filtered(){
  const q=(document.getElementById('q').value||'').trim().toLowerCase();
  let items=ALL.filter(withinHoras);
  if(fEstado==='activos')items=items.filter(n=>n.rescate_estado!=='atendida'&&n.rescate_estado!=='falsa');
  else if(fEstado!=='todos')items=items.filter(n=>(n.rescate_estado||'nuevo')===fEstado);
  if(q)items=items.filter(n=>((n.zona||'')+' '+(n.direccion_exacta||'')+' '+(n.descripcion||'')+' '+(n.nombre_contacto||'')).toLowerCase().includes(q));
  // Orden: signos de vida arriba, luego más reciente
  items.sort((a,b)=>{const la=hasLife(a)?1:0,lb=hasLife(b)?1:0;if(la!==lb)return lb-la;
    return new Date(b.created_at)-new Date(a.created_at);});
  return items;
}

function render(){
  renderChips();
  const items=filtered();
  document.getElementById('count-line').textContent=items.length+(items.length===1?' reporte':' reportes');
  if(view==='mapa'){renderMapa();return;}
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<div class="empty"><div class="ico">✅</div>No hay reportes de rescate con estos filtros.<br>Prueba ampliar la ventana de tiempo.</div>';
    const ctx=fEstado+'|'+fHoras+'|'+(document.getElementById('q').value?'q':'');
    if(_lastEmpty!==ctx){_lastEmpty=ctx;track(E.RESCATE_EMPTY_SHOWN,{estado:fEstado,ventana:fHoras,con_busqueda:!!document.getElementById('q').value});}
    return;}
  _lastEmpty=null;
  el.innerHTML=items.map(card).join('');
}
let _lastEmpty=null;

function card(n){
  const st=n.rescate_estado||'nuevo';
  const urg=n.urgencia||'urgente';
  const ub={critica:'b-crit',urgente:'b-urg',normal:'b-nor'}[urg]||'b-urg';
  const ul={critica:'🔴 Crítica',urgente:'🟠 Urgente',normal:'🟢 Normal'}[urg]||'🟠 Urgente';
  const lat=n.lat,lng=n.lng;
  const mapUrl=lat&&lng?`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`:`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(locStr(n))}`;
  const phone=isPhoneish(n.telefono)?tel(n.telefono):'';
  const wa=waNum(n.whatsapp||n.telefono);
  const desc=cleanText(n.descripcion);
  const srcName=SRC[n.fuente]||n.fuente||'';
  const rawName=(n.nombre_contacto||'').trim();
  const nameOk=rawName && !/^(vecino\/a|donante)$/i.test(rawName) && !/https?:|www\.|@|\//.test(rawName) && rawName.length<=40;
  const title=nameOk?esc(rawName)
    :(n.personas_afectadas>1?esc(n.personas_afectadas+' personas atrapadas')
      :(hasTrap(n)?'Personas atrapadas':'Reporte de rescate'));

  const badges=[`<span class="badge ${ub}">${ul}</span>`];
  if(hasLife(n))badges.push('<span class="badge b-life">🫀 Signos de vida</span>');
  else if(hasTrap(n))badges.push('<span class="badge b-trap">⚠️ Atrapados</span>');
  badges.push(`<span class="badge b-st st-${st}">${ST_LABEL[st]||st}</span>`);

  const contactBtns=[];
  if(phone)contactBtns.push(`<a class="abtn a-call" href="tel:${esc(phone)}" onclick="rContact('llamar','${n.id}')">📞 Llamar</a>`);
  if(wa)contactBtns.push(`<a class="abtn a-wa" href="https://wa.me/${esc(wa)}" target="_blank" rel="noopener" onclick="rContact('whatsapp','${n.id}')">WhatsApp</a>`);
  contactBtns.push(`<a class="abtn a-map" href="${mapUrl}" target="_blank" rel="noopener" onclick="rContact('ruta','${n.id}')">🧭 Ruta</a>`);
  if(n.source_url)contactBtns.push(`<a class="abtn a-post" href="${esc(n.source_url)}" target="_blank" rel="noopener" onclick="rContact('ver_post','${n.id}')">Ver post ↗</a>`);
  if(!phone&&!wa)contactBtns.push('<span class="a-notel">📵 Sin teléfono — validar en sitio / ver post</span>');

  const sbtns=['verificando','confirmada','atendida','falsa'].map(s=>
    `<button class="sbtn s-${s}${st===s?' cur':''}" ${st===s?'':`onclick="setEstadoRescate('${n.id}','${s}')"`}>${ST_LABEL[s]}</button>`).join('');

  return `<article class="card st-${st}">
    <div class="card-top">${badges.join('')}<span class="c-time">${ago(n.created_at)}</span></div>
    <div class="c-title">${title}</div>
    <div class="c-loc"><span class="pin">📍</span><span>${esc(locStr(n))}</span></div>
    ${desc?`<div class="c-desc">${esc(desc)}</div>`:''}
    <div class="c-src">${srcName?`<span class="src-tag">${esc(srcName)}</span>`:''}${n.confirmaciones>1?`· ${n.confirmaciones} confirmaciones`:''}</div>
    <div class="actions">${contactBtns.join('')}</div>
    ${n.rescate_notas?`<div class="rnote">🗒 ${esc(n.rescate_notas)}</div>`:''}
    <div class="status-bar">
      <div class="status-lbl">Estado del rescate ${n.rescate_actualizado_at?'· '+ago(n.rescate_actualizado_at):''}</div>
      <div class="sbtns">${sbtns}</div>
    </div>
  </article>`;
}

function rContact(metodo,id){track(E.RESCATE_CONTACT_CLICKED,Object.assign({metodo},needMeta(ALL.find(n=>n.id===id))));}

async function setEstadoRescate(id,estado){
  const labels={verificando:'marcar EN VERIFICACIÓN (mandas brigada a validar)',confirmada:'marcar CONFIRMADA (la brigada validó que es real)',atendida:'marcar ATENDIDA (rescate resuelto — sale del mapa público)',falsa:'marcar como FALSA (sale del mapa público)'};
  let notas=null;
  if(estado==='verificando'||estado==='confirmada'){
    notas=prompt('Nota opcional para el equipo (brigada, hora, contacto):','')||null;
  }else if(!confirm('¿Seguro que quieres '+labels[estado]+'?')){return;}
  const local=ALL.find(n=>n.id===id);
  const desde=(local&&local.rescate_estado)||'nuevo';
  const{error}=await db.rpc('actualizar_rescate_estado',{p_id:id,p_estado:estado,p_notas:notas});
  if(error){toast('No se pudo actualizar');console.error(error);track(E.RESCATE_STATUS_CHANGED,{ok:false,a:estado,desde,need_id:id});return;}
  track(E.RESCATE_STATUS_CHANGED,Object.assign({ok:true,a:estado,desde,con_nota:!!notas},needMeta(local)));
  if(local){local.rescate_estado=estado;local.rescate_actualizado_at=new Date().toISOString();if(notas)local.rescate_notas=notas;
    if(estado==='atendida')local.estado='cubierta';if(estado==='falsa')local.estado='eliminada';
    if(estado==='confirmada'||estado==='atendida')local.validada=true;}
  toast('✓ '+(ST_LABEL[estado]||estado));
  render();
}

function ensureMap(){
  if(map)return;
  map=L.map('map',{zoomControl:true,attributionControl:false}).setView([10.6,-66.9],9);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);
  markers=L.layerGroup().addTo(map);
}
function markerColor(n){const st=n.rescate_estado||'nuevo';
  if(st==='confirmada')return'#1E8449';if(st==='verificando')return'#2471A3';
  if(st==='atendida'||st==='falsa')return'#9A938B';return'#C0392B';}
function renderMapa(){
  ensureMap();setTimeout(()=>map.invalidateSize(),50);
  markers.clearLayers();
  const items=filtered().filter(n=>n.lat&&n.lng);
  const pts=[];
  items.forEach(n=>{
    const c=markerColor(n);
    const ico=L.divIcon({className:'',html:`<div style="width:20px;height:20px;border-radius:50%;background:${c};border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.4)"></div>`,iconSize:[20,20],iconAnchor:[10,10]});
    const m=L.marker([n.lat,n.lng],{icon:ico}).addTo(markers);
    m.on('click',()=>track(E.RESCATE_MAP_MARKER_CLICKED,needMeta(n)));
    const life=hasLife(n)?'<b style="color:#9B2418">🫀 Signos de vida</b><br>':(hasTrap(n)?'⚠️ Atrapados<br>':'');
    m.bindPopup(`${life}<b>${esc(locStr(n))}</b><br>${ST_LABEL[n.rescate_estado||'nuevo']} · ${ago(n.created_at)}<br><a href="https://www.google.com/maps/dir/?api=1&destination=${n.lat},${n.lng}" target="_blank" rel="noopener">🧭 Cómo llegar</a>`);
    pts.push([n.lat,n.lng]);
  });
  if(pts.length)map.fitBounds(pts,{padding:[40,40],maxZoom:14});
}

// PostHog: page directa (sin router SPA). Registramos page:'rescatistas'
// para separar esta vista del resto de la app en los dashboards.
if(window.posthog&&window.POSTHOG_KEY){
  posthog.init(window.POSTHOG_KEY,{
    api_host:window.POSTHOG_HOST||'https://eu.i.posthog.com',
    ui_host:'https://eu.posthog.com',
    persistence:'cookie',
    person_profiles:'always',
    capture_pageview:true,
    capture_pageleave:true,
    disable_session_recording:true,
    autocapture:false,
    loaded:function(){
      posthog.register({app:'ayuda_venezuela',page:'rescatistas',host:location.host});
      track(E.RESCATE_PAGE_OPENED,{
        referrer_host:(()=>{try{return document.referrer?new URL(document.referrer).host:null;}catch(_){return null;}})(),
        estado_inicial:fEstado,ventana_inicial:fHoras
      });
    }
  });
}

db.channel('rescate-live')
  .on('postgres_changes',{event:'*',schema:'public',table:'necesidades'},()=>cargar())
  .subscribe();

cargar();
</script>
