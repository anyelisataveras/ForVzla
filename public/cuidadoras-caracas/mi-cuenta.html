<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#5A4AA0">
<title>Mi cuenta — Cuidadoras Caracas</title>
<link rel="icon" href="../icon.svg" type="image/svg+xml">
<script>window.__nativeFetch=window.fetch.bind(window);</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F1EEEA;--ind:#5A4AA0;--indl:#EEEBF6;--indt:#463A82;--grn:#1E8449;--ora:#E67E22;--orl:#FEF9E7;--txt:#1C1A19;--txt2:#6B6560;--txt3:#9A938B;--line:#E7E2DB;--line2:#E2DCD4;--app-max:580px}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:16px}
.app{max-width:var(--app-max);margin:0 auto;min-height:100vh;padding-bottom:24px}
.hdr{background:var(--ind);color:#fff;padding:16px 18px}
.hdr a{color:#fff;text-decoration:none;font-size:14px;font-weight:600;opacity:.9}
.hdr h1{font-size:20px;font-weight:800;margin-top:8px}
.hdr p{font-size:13px;opacity:.9;margin-top:4px}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;margin:16px;padding:18px}
.card-t{font-size:13px;font-weight:800;color:var(--indt);margin-bottom:10px}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;border:1.5px solid var(--line2);background:#fff;border-radius:10px;padding:10px 6px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--txt2);text-align:center}
.tab.on{border-color:var(--ind);background:var(--indl);color:var(--indt)}
.brig{display:flex;flex-direction:column;gap:8px}
.brig-item{border:1.5px solid var(--line2);border-radius:12px;padding:12px;cursor:pointer;font-size:14px}
.brig-item.on{border-color:var(--ind);background:var(--indl)}
.jlist{display:flex;flex-direction:column;gap:10px}
.jcard{display:block;background:var(--bg);border:1px solid var(--line2);border-radius:14px;padding:14px;text-decoration:none;color:inherit}
.jcard b{font-size:15px;display:block;margin-bottom:4px;line-height:1.35}
.jmeta{font-size:13px;color:var(--txt2);line-height:1.45}
.jrow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;display:inline-block}
.badge.open{background:#E9F6EE;color:var(--grn)}
.badge.full{background:#FEF9E7;color:#E67E22}
.badge.done{background:#eee;color:#9A938B}
.badge.me{background:var(--indl);color:var(--indt)}
.badge.photos{background:var(--orl);color:var(--ora)}
.thumb-strip{display:flex;gap:4px;margin-top:10px;border-radius:10px;overflow:hidden}
.thumb{flex:1;aspect-ratio:4/3;background:#ccc;position:relative;overflow:hidden;min-width:0}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover;display:block}
.thumb .more{position:absolute;inset:0;background:rgba(0,0,0,.52);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center}
.thumb-vid::after{content:'▶';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;background:rgba(0,0,0,.28);pointer-events:none}
.jempty{font-size:13px;color:var(--txt2);line-height:1.5;padding:8px 0;text-align:center}
.jcta{font-size:12px;font-weight:800;color:var(--ind)}
.menu-list{display:flex;flex-direction:column;gap:0;margin-top:4px}
.menu-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);cursor:pointer;background:none;border-left:none;border-right:none;border-top:none;width:100%;font-family:inherit;text-align:left;color:inherit;text-decoration:none}
.menu-item:last-child{border-bottom:none;padding-bottom:0}
.menu-item:first-child{padding-top:0}
.menu-item:active{opacity:.7}
.menu-item-ico{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.menu-item-body{flex:1;min-width:0}
.menu-item-t{font-size:15px;font-weight:800;display:block}
.menu-item-s{font-size:12px;color:var(--txt2);margin-top:2px;line-height:1.35}
.menu-item-arrow{color:var(--txt3);font-size:18px;font-weight:700;flex-shrink:0}
.btn{border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;width:100%;background:var(--grn);color:#fff;font-family:inherit;margin-top:8px}
.btn-ghost{background:#fff;border:1px solid var(--line2);color:var(--txt2);margin-top:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--txt);color:#fff;padding:12px 18px;border-radius:999px;font-size:14px;font-weight:700;opacity:0;transition:opacity .2s;z-index:99}
.toast.show{opacity:1}
.jm-lightbox{position:fixed;inset:0;background:#000;z-index:200;display:flex;flex-direction:column}
.jm-lb-top{padding:14px 16px 8px;color:#fff;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-shrink:0}
.jm-lb-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 8px;font-family:inherit;flex-shrink:0}
.jm-lb-head{flex:1;text-align:center;min-width:0}
.jm-lb-title{font-weight:800;font-size:14px;line-height:1.3}
.jm-lb-counter{font-size:12px;opacity:.8;margin-top:2px}
.jm-lb-stage-wrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;position:relative;padding:0 4px}
.jm-lb-stage{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;max-height:100%}
.jm-lb-media{max-width:100%;max-height:72vh;object-fit:contain;border-radius:4px}
.jm-lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer;font-family:inherit;z-index:2}
.jm-lb-prev{left:8px}.jm-lb-next{right:8px}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <a href="/cuidadoras-caracas/">← Inicio</a>
    <h1 id="hola">Mi cuenta</h1>
    <p id="num"></p>
  </header>
  <div class="card">
    <div class="card-t">Jornadas</div>
    <div class="tabs" role="tablist" aria-label="Filtrar jornadas">
      <button type="button" class="tab on" data-tab="proximas" role="tab" aria-selected="true">Próximas</button>
      <button type="button" class="tab" data-tab="pasadas" role="tab" aria-selected="false">Pasadas</button>
      <button type="button" class="tab" data-tab="todas" role="tab" aria-selected="false">Todas</button>
    </div>
    <div class="jlist" id="jornadas-list"><div class="jempty">Cargando jornadas…</div></div>
  </div>
  <div class="card">
    <div class="card-t">Mis brigadas</div>
    <p style="font-size:13px;color:var(--txt2);margin-bottom:12px;line-height:1.45">Elige dónde quieres colaborar. Si te asignaron una brigada, puedes cambiarla cuando quieras.</p>
    <div class="brig" id="brig"></div>
    <button type="button" class="btn" id="btn-save">Guardar brigadas</button>
  </div>
  <div class="card">
    <div class="card-t">Datos de mi cuenta</div>
    <div class="menu-list">
      <a class="menu-item" id="menu-carnet" href="/cuidadoras-caracas/carnet?from=cuenta">
        <span class="menu-item-ico">🪪</span>
        <span class="menu-item-body">
          <span class="menu-item-t">Mi carnet</span>
          <span class="menu-item-s" id="carnet-sub">Cargando…</span>
        </span>
        <span class="menu-item-arrow">›</span>
      </a>
    </div>
    <button type="button" class="btn btn-ghost" id="btn-out">Cerrar sesión</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>window.CC_GRUPO_SLUG='cuidadoras_caracas';</script>
<script src="vol.js?v=20260714a"></script>
<script src="jornada-media.js?v=20260714c"></script>
<script src="carnet.js?v=20260712h"></script>
<script>
if(!CC_VOL.requireSession('mi-cuenta'))throw 0;
const vol=CC_VOL.getSession();
const sel=new Set(vol.brigadas||[]);
let brigCat=[];
let jornadasAll=[];
let jornadaTab='proximas';

document.getElementById('hola').textContent='Hola, '+vol.nombre+' 👋';
document.getElementById('num').textContent='Voluntaria N° '+vol.numero_voluntaria;

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}

function emptyJornadasMsg(){
  if(jornadaTab==='proximas')return'📅 No hay jornadas próximas.<br>El grupo te avisará por WhatsApp.';
  if(jornadaTab==='pasadas')return'No hay jornadas pasadas en los últimos 30 días.';
  return'No hay jornadas publicadas aún.';
}

function renderJornadas(){
  const el=document.getElementById('jornadas-list');
  const rows=CC_VOL.filterJornadas(jornadasAll,jornadaTab);
  if(!rows.length){el.innerHTML=`<div class="jempty">${emptyJornadasMsg()}</div>`;return}
  const JM=CC_JORNADA_MEDIA;
  el.innerHTML=rows.map(j=>{
    const strip=j.mediaTotal?JM.thumbStripHtml(j.mediaPreviews,j.mediaTotal,j.mediaUrls||{}):'';
    const photos=j.mediaTotal?JM.badgesMedia(j.mediaTotal):'';
    const cta=JM.ctaForJornada(j,jornadaTab,j.mediaTotal||0);
    return`<a class="jcard" href="${CC_VOL.jornadaUrl(j.id)}">
      <b>${esc(j.titulo)}</b>
      <div class="jmeta">🗓 ${CC_VOL.fmtJornadaDate(j.fecha)}${j.hora_salida?' · '+CC_VOL.fmtJornadaTime(j.hora_salida):''}<br>
      📍 ${esc(j.sitio_nombre||j.sitio_zona||'Por confirmar')}</div>
      ${strip}
      <div class="jrow">
        <div>${CC_VOL.jornadaEstadoBadge(j.estado)} ${CC_VOL.inscripcionBadge(j.inscEstado)} ${photos}</div>
        <span class="jcta">${cta}</span>
      </div>
    </a>`;
  }).join('');
}

function setJornadaTab(tab){
  jornadaTab=tab;
  document.querySelectorAll('.tab').forEach(btn=>{
    const on=btn.dataset.tab===tab;
    btn.classList.toggle('on',on);
    btn.setAttribute('aria-selected',on?'true':'false');
  });
  CC_JORNADA_MEDIA.enrichJornadasWithMedia(jornadasAll).then(rows=>{
    jornadasAll=rows;
    renderJornadas();
  });
}

async function loadJornadas(){
  const el=document.getElementById('jornadas-list');
  try{
    const cred=CC_VOL.credParams();
    const{data,error}=await CC_VOL.db.rpc('jornadas_publicas',{p_grupo:CC_VOL.GRUPO});
    if(error){el.innerHTML=`<div class="jempty">${esc(error.message)}</div>`;return}
    const rows=Array.isArray(data)?data:[];
    if(!cred){
      jornadasAll=rows.map(j=>({...j,inscEstado:null}));
      renderJornadas();
      return;
    }
    jornadasAll=await Promise.all(rows.map(async j=>{
      const{data:ins}=await CC_VOL.db.rpc('mi_inscripcion_jornada',{...cred,p_jornada_id:j.id});
      return{...j,inscEstado:ins?.inscripcion?.estado||null};
    }));
    try{
      jornadasAll=await CC_JORNADA_MEDIA.enrichJornadasWithMedia(jornadasAll);
    }catch(_e){/* listado sin thumbs si falla media */}
    renderJornadas();
  }catch(e){
    el.innerHTML=`<div class="jempty">${esc(e.message||'No se pudieron cargar las jornadas')}</div>`;
  }
}

async function loadCarnetMenu(){
  const sub=document.getElementById('carnet-sub');
  const link=document.getElementById('menu-carnet');
  try{
    const d=await CC_CARNET.disponible();
    if(!d.template_available){
      sub.textContent='No disponible para este grupo';
      return;
    }
    sub.textContent=d.menu_subtitulo||'Generar o descargar';
  }catch(e){
    sub.textContent='Generar o descargar';
  }
}

function renderBrigadas(){
  document.getElementById('brig').innerHTML=brigCat.map(b=>`
    <div class="brig-item${sel.has(b.slug)?' on':''}" data-s="${b.slug}">
      <b>${b.icono||'•'} ${esc(b.nombre)}</b>
      <div style="font-size:12px;color:var(--txt2);margin-top:4px">${esc(b.mision)}</div>
    </div>`).join('');
  document.querySelectorAll('.brig-item').forEach(el=>{
    el.onclick=()=>{const s=el.dataset.s;if(sel.has(s))sel.delete(s);else sel.add(s);renderBrigadas()};
  });
}

async function init(){
  document.querySelectorAll('.tab').forEach(btn=>btn.onclick=()=>setJornadaTab(btn.dataset.tab));
  const{data}=await CC_VOL.db.from('brigadas').select('slug,nombre,mision,icono').eq('grupo',CC_VOL.GRUPO).eq('activa',true).order('orden');
  brigCat=data||[];
  renderBrigadas();
  loadJornadas();
  loadCarnetMenu();
}

document.getElementById('btn-save').onclick=async()=>{
  const c=CC_VOL.credParams();
  const{data,error}=await CC_VOL.db.rpc('actualizar_brigadas_voluntario',{...c,p_brigadas:[...sel]});
  if(error||!data?.ok){toast(error?.message||data?.error||'Error');return}
  CC_VOL.setSession({...vol,brigadas:data.brigadas},vol.cred);
  toast('Brigadas guardadas');
};
document.getElementById('btn-out').onclick=()=>{CC_VOL.clearSession();location.href='/cuidadoras-caracas/'};
init();
</script>
</body>
</html>
